name: Keep-Alive Pinger

on:
  schedule:
    # Runs every 15 minutes to prevent Render free-tier sleep
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          echo "Pinging TrustTrade Backend at $(date)"
          curl -i https://trusttrade-6d81.onrender.com/api/health
