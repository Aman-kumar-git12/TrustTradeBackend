name: Keep-Alive Pinger

on:
  schedule:
    # Staggered: runs at minutes 7, 22, 37, and 52 to avoid clashing with other 15-min monitors
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          echo "Pinging TrustTrade Backend at $(date)"
          curl -i https://trusttrade-6d81.onrender.com/api/health
